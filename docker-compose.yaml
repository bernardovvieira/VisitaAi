services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    container_name: visita-ai-app
    working_dir: /var/www/html
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/var/www/html
    networks:
      - visitaai_network

  db:
    image: mysql:8.0
    container_name: visita-ai-db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: visita_ai
      MYSQL_USER: visita
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - visitaai_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    container_name: visitaai_web
    # Sem ports: Coolify acessa por rede interna. Para teste local, use: docker compose run --rm -p 8080:80 web (ou crie docker-compose.override.yml com ports: - "8080:80")
    volumes:
      - .:/var/www/html
    depends_on:
      - app
    networks:
      - visitaai_network

networks:
  visitaai_network:

volumes:
  dbdata: