services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    working_dir: /var/www/html
    environment:
      APP_ENV: production
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: visita_ai
      DB_USERNAME: visita
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - visitaai_network

  db:
    image: mysql:8.0
    environment:
      MYSQL_RANDOM_ROOT_PASSWORD: "yes"
      MYSQL_DATABASE: visita_ai
      MYSQL_USER: visita
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${MYSQL_HOST_PORT:-0}:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - visitaai_network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u \"$$MYSQL_USER\" -p\"$$MYSQL_PASSWORD\" || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    depends_on:
      - app
    networks:
      - visitaai_network

networks:
  visitaai_network:

volumes:
  dbdata: